<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="480" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Terminal window -->
  <rect x="0" y="0" width="480" height="160" rx="16" fill="url(#bg)"/>
  <rect x="0" y="0" width="480" height="160" rx="16" stroke="#30363d" stroke-width="1.5"/>

  <!-- Title bar dots -->
  <circle cx="24" cy="20" r="5.5" fill="#f85149" opacity="0.9"/>
  <circle cx="44" cy="20" r="5.5" fill="#d29922" opacity="0.9"/>
  <circle cx="64" cy="20" r="5.5" fill="#3fb950" opacity="0.9"/>

  <!-- Subtle glow on the bottom -->
  <rect x="40" y="100" width="400" height="50" rx="4" fill="url(#glow)" opacity="0.15"/>

  <!-- Prompt symbol -->
  <text x="36" y="105" font-family="'SF Mono','Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="52" font-weight="700" fill="#8b949e" filter="url(#textglow)">❯</text>

  <!-- "ai" logotype -->
  <text x="100" y="107" font-family="'SF Mono','Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="64" font-weight="800" letter-spacing="-2" fill="#f0f6fc" filter="url(#textglow)">ai</text>

  <!-- Cursor -->
  <rect x="228" y="68" width="4" height="48" rx="2" fill="#3fb950" opacity="0.9" filter="url(#softglow)">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline -->
  <text x="260" y="100" font-family="'SF Mono','Cascadia Code','Fira Code','JetBrains Mono',monospace" font-size="18" fill="#8b949e" letter-spacing="0.5">Shell Assistant</text>

</svg>
